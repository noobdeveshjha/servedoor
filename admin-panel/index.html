<!DOCTYPE html>
<html>
<head>
  <title>Servedoor Admin Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
  <div class="max-w-7xl mx-auto p-8">
    <h1 class="text-4xl font-bold mb-8">Servedoor Admin Dashboard</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
      <div class="bg-white p-6 rounded-xl shadow">
        <h3 class="font-semibold">Total Orders Today</h3>
        <p class="text-4xl font-bold text-orange-600">1,284</p>
      </div>
      <div class="bg-white p-6 rounded-xl shadow">
        <h3 class="font-semibold">Revenue</h3>
        <p class="text-4xl font-bold text-green-600">₹4,85,000</p>
      </div>
    </div>

    <div class="mt-10 bg-white p-6 rounded-xl shadow">
      <h2 class="text-2xl font-semibold mb-4">Recent Orders</h2>
      <table class="w-full">
        <tr class="border-b"><th class="text-left py-3">Order ID</th><th>Customer</th><th>Status</th><th>Amount</th></tr>
        <tr class="border-b"><td>#ORD-10234</td><td>Rahul Kumar</td><td class="text-green-600">Delivered</td><td>₹349</td></tr>
        <tr class="border-b"><td>#ORD-10235</td><td>Priya Sharma</td><td class="text-orange-600">On the way</td><td>₹599</td></tr>
      </table>
    </div>
  </div>
</body>
</html>
